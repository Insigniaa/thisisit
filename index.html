<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="IP2 ALWAYS - Live Stream Directory">
    <meta name="theme-color" content="#0E0E10">
    <meta property="og:title" content="IP2 ALWAYS">
    <meta property="og:description" content="Live Stream Directory - Watch your favorite streamers">
    <meta property="og:type" content="website">
    
    <title>IP2 ALWAYS</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Critical CSS only - rest moved to styles.css */
        body {
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0E0E10;
            color: #efeff1;
        }
        
        .stream-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 800px;
            margin: 0 auto;
        }

        .stream-item {
            background-color: #1F1F23;
            border-radius: 0;
            overflow: hidden;
            position: relative;
            padding-left: 4px;
        }

        .stream-link {
            display: flex;
            text-decoration: none;
            color: inherit;
            padding: 10px;
        }

        .thumbnail-container {
            width: 50px;
            height: 50px;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .stream-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
        }

        .streamer-name {
            font-weight: bold;
            margin-bottom: 4px;
        }

        .stream-title {
            color: #ADADB8;
            font-size: 0.9em;
            margin-bottom: 4px;
        }

        .viewer-count {
            color: #ADADB8;
            font-size: 0.8em;
        }

        .offline {
            opacity: 0.6;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #efeff1;
        }

        .live-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #eb0400;
            border-radius: 50%;
            margin-right: 6px;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .refresh-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: rgba(24, 24, 27, 0.9);
            color: #ADADB8;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.8em;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            z-index: 1000;
        }

        .refresh-notification.show {
            opacity: 1;
        }
        
        .back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: rgba(24, 24, 27, 0.9);
            color: #ADADB8;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.8em;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="images/IP2CX-Logo.png" alt="IP2CX Logo" class="logo">
    </div>
    <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-input" placeholder="Search streams...">
    </div>
    <main>
        <section class="stream-list" id="streamList">
        </section>

        <div id="banned-streamers" class="banned-streamers">
            <div id="banned-streamers-list"></div>
        </div>
    </main>

    <div id="error-message" class="error-message" role="alert" aria-live="assertive"></div>
    <div class="refresh-notification" id="refreshNotification" role="status" aria-live="polite">Last updated just now</div>
    
    <button class="back-to-top" id="backToTop">↑</button>
    
    <script src="script.js" defer></script>
</body>
</html>
